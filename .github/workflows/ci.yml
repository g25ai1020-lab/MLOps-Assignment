name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  check_working_repo:
    runs-on: ubuntu-latest
    
    steps:
    # Step 1: Checkout repository
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    # Step 2: Set up Python environment
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    # Step 4: Run training script
    - name: Run training script
      run: |
        echo "=========================================="
        echo "Starting Model Training"
        echo "=========================================="
        python train.py
        echo "=========================================="
        echo "Training Completed"
        echo "=========================================="
    
    # Step 5: Verify model file
    - name: Verify model file
      run: |
        if [ -f "savedmodel.pth" ]; then
          echo "✓ Model file created successfully"
          ls -lh savedmodel.pth
        else
          echo "✗ Model file not found"
          exit 1
        fi
    
    # Step 6: Run testing script
    - name: Run testing script
      run: |
        echo "=========================================="
        echo "Starting Model Testing"
        echo "=========================================="
        python test.py
        echo "=========================================="
        echo "Testing Completed"
        echo "=========================================="
