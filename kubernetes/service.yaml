apiVersion: v1
kind: Service
metadata:
  name: olivetti-classifier-service
  labels:
    app: olivetti-classifier
spec:
  type: NodePort
  selector:
    app: olivetti-classifier
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30001
    protocol: TCP
    name: http
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800